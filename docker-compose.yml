services:

  neo4j:
    image: neo4j:5
    container_name: importtrace-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/admin1234
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "admin1234", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build: ./backend
    container_name: importtrace-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: admin1234
      JWT_SECRET: ${JWT_SECRET:-importtrace_secret_2024}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: importtrace-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
